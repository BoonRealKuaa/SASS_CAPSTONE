<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng - Phone Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../../asset/css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../../index.html">
          <i class="bi bi-phone"></i> Phone Shop
        </a>
        <div class="d-flex align-items-center gap-3">
          <a href="../../index.html" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua hàng
          </a>
          <a href="../../admin/view/index.html" class="btn btn-outline-warning btn-sm">
            <i class="bi bi-gear"></i> Quản trị
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <h2 class="fw-bold mb-4"><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>

      <!-- Giỏ hàng trống -->
      <div id="cart-empty" class="text-center py-5">
        <i class="bi bi-cart-x cart-empty-icon"></i>
        <p class="text-muted mt-3 fs-5">Giỏ hàng trống</p>
        <a href="../../index.html" class="btn btn-primary">Mua sắm ngay</a>
      </div>

      <div class="row d-none" id="cart-summary">
        <!-- Danh sách sản phẩm -->
        <div class="col-lg-8">
          <div id="cart-container"></div>
          <button type="button" class="btn btn-outline-danger btn-sm mt-3" id="btn-clear-cart">
            <i class="bi bi-trash"></i> Xóa tất cả
          </button>
        </div>

        <!-- Tổng tiền -->
        <div class="col-lg-4 mt-4 mt-lg-0">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title fw-bold">Tổng đơn hàng</h5>
              <hr />
              <div class="d-flex justify-content-between fs-5 fw-bold text-danger">
                <span>Tổng cộng:</span>
                <span id="cart-total">0 ₫</span>
              </div>
              <button type="button" class="btn btn-success w-100 mt-3 btn-lg">
                <i class="bi bi-credit-card"></i> Thanh toán
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../model/CartItem.js"></script>
    <script src="../model/Cart.js"></script>
    <script src="../services/CartService.js"></script>
    <script src="CartView.js"></script>
    <script src="../controller/CartController.js"></script>
    <script>
      window.BASE_PATH = "../../";
      CartController.init();
    </script>
  </body>
</html>
