<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết sản phẩm - Phone Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../../asset/css/style.css" />
  </head>
  <body>

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../../index.html">
          <i class="bi bi-phone-fill me-1"></i> Phone<strong>Shop</strong>
        </a>
        <div class="d-flex align-items-center gap-2">
          <a href="../../index.html" class="btn btn-outline-light btn-sm" title="Tiếp tục mua hàng">
            <i class="bi bi-arrow-left me-1"></i> Mua tiếp
          </a>
          <button type="button" class="btn btn-outline-warning btn-sm position-relative" id="btn-cart-detail" title="Xem giỏ hàng">
            <i class="bi bi-cart3"></i>
            <span class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill" id="cart-badge-detail">0</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Not found state -->
    <div id="detail-not-found" class="d-none">
      <div class="container text-center py-5">
        <i class="bi bi-exclamation-triangle-fill text-warning not-found-icon"></i>
        <h3 class="mt-3">Không tìm thấy sản phẩm</h3>
        <a href="../../index.html" class="btn btn-primary mt-3">Về trang chủ</a>
      </div>
    </div>

    <!-- Detail content -->
    <div id="detail-content" class="d-none">
      <div class="container py-4">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="../../index.html">Trang chủ</a></li>
            <li class="breadcrumb-item active" id="breadcrumb-name">Chi tiết sản phẩm</li>
          </ol>
        </nav>

        <div class="row g-4">

          <!-- Left: Product image + Video -->
          <div class="col-lg-5 reveal">
            <div class="detail-img-wrap mb-3">
              <img id="detail-img" src="" alt="" class="detail-img" />
            </div>
            <!-- Video embed (compact) -->
            <div class="detail-video-box">
              <div class="detail-video-ratio">
                <iframe
                  id="detail-video"
                  src=""
                  title="Video giới thiệu sản phẩm"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen
                ></iframe>
              </div>
            </div>
          </div>

          <!-- Right: Info -->
          <div class="col-lg-7 reveal delay-2">
            <span class="badge detail-type-badge mb-2" id="detail-type"></span>
            <h1 class="fw-bold mb-1" id="detail-name"></h1>
            <p class="text-muted mb-3" id="detail-desc"></p>
            <div class="detail-price mb-4" id="detail-price"></div>

            <!-- Specs quick summary -->
            <div class="detail-specs-grid mb-4" id="detail-specs-grid"></div>

            <!-- Add to cart -->
            <div class="d-flex gap-3 align-items-center mb-4">
              <div class="input-group detail-qty-group">
                <button type="button" class="btn btn-outline-secondary" id="btn-qty-minus" title="Giảm">
                  <i class="bi bi-dash"></i>
                </button>
                <input type="number" class="form-control text-center" id="input-qty" value="1" min="1" max="99" readonly />
                <button type="button" class="btn btn-outline-secondary" id="btn-qty-plus" title="Tăng">
                  <i class="bi bi-plus"></i>
                </button>
              </div>
              <button type="button" class="btn btn-danger btn-lg flex-grow-1" id="btn-add-cart">
                <i class="bi bi-cart-plus me-2"></i>Thêm vào giỏ hàng
              </button>
            </div>

            <!-- Features list -->
            <div class="detail-features" id="detail-features"></div>
          </div>
        </div>

        <!-- Full specs table -->
        <div class="mt-5 mb-5 reveal delay-3">
          <h3 class="fw-bold mb-3"><i class="bi bi-list-columns me-2 text-danger"></i>Thông số kỹ thuật</h3>
          <table class="table table-bordered detail-specs-table" id="detail-specs-table"></table>
        </div>

      </div>
    </div>

    <!-- Toast -->
    <div id="toast-message" class="toast-custom" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../asset/js/animations.js"></script>
    <script src="../model/Product.js"></script>
    <script src="../model/CartItem.js"></script>
    <script src="../model/Cart.js"></script>
    <script src="../services/ProductService.js"></script>
    <script src="../services/CartService.js"></script>
    <script src="ProductDetailView.js"></script>
    <script src="../controller/ProductDetailController.js"></script>
    <script>
      window.BASE_PATH = "../../";
      ProductDetailController.init();
    </script>
  </body>
</html>
